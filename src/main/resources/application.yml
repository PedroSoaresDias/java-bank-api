spring:
  application:
    name: java-bank

  threads:
    virtual:
      enabled: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    validate-on-migrate: true
  r2dbc:
    url: ${PG_URL}
    username: ${PG_USER}
    password: ${PG_PASSWORD}
    show-sql: true

  sql:
    init:
      mode: never

  # h2:
  #   console:
  #     enabled: true
  #     path: /h2-console
  #     settings:
  #       trace: true
  #       web-allow-others: false

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}

logging:
  level: 
    org:
      springframework:
        data:
          r2dbc: DEBUG
